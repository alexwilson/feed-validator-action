name: 'Feed Validator Action'
description: 'Validate an Atom/RSS feed using the W3C validator.'

branding:
  icon: rss
  color: orange

inputs:
  feed:
    description: 'Path or URL of the feed to validate.'
    required: true
  origin-url:
    description: >
      Local-file mode only. When set, the validator treats the feed as if
      loaded from this URL, so the origin/self-link checks pass for an
      artefact that has not been deployed yet. Ignored when `feed` is a URL.
    required: false
    default: ''
  python-version:
    description: 'Python version to install for running the validator.'
    required: false
    default: '3.x'
  fail-on:
    description: >
      When to fail the step: `errors` (default; any validator error),
      `warnings` (any warning or error), `info` (any event at all,
      including informational ones), or `never` (run for reporting only).
    required: false
    default: errors
  compatibility:
    description: >
      Validator strictness: `A` (loosest), `AA` (default; mimics the online
      validator), or `AAA` (experimental, rules may change between upstream
      versions).
    required: false
    default: AA

outputs:
  errors:
    description: 'Number of errors reported by the validator.'
    value: ${{ steps.validate.outputs.errors }}
  warnings:
    description: 'Number of warnings reported by the validator.'
    value: ${{ steps.validate.outputs.warnings }}
  info:
    description: 'Number of informational events reported by the validator.'
    value: ${{ steps.validate.outputs.info }}
  issues:
    description: 'Total of errors + warnings (informational events excluded).'
    value: ${{ steps.validate.outputs.issues }}
  report-path:
    description: 'Path to the captured validator report (text file).'
    value: ${{ steps.validate.outputs.report-path }}

runs:
  using: composite
  steps:
    # GitHub fetches actions via a tarball that doesn't recurse submodules,
    # so vendor/feedvalidator ships empty. Recover the pinned SHA from the
    # public contents API at the ref the consumer used, then download the
    # matching feedvalidator source.
    - name: Fetch vendored feedvalidator at pinned SHA
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPO: ${{ github.action_repository }}
      run: |
        set -euo pipefail
        target="${GITHUB_ACTION_PATH}/vendor/feedvalidator"
        # If the submodule is already populated, the action is being used
        # locally (e.g. via `uses: ./` in this repo's own tests) and the
        # consumer's checkout brought the source along. Nothing to do.
        if [ -f "${target}/src/feedvalidator/__init__.py" ]; then
          echo "vendor/feedvalidator already populated; skipping runtime fetch"
          exit 0
        fi
        if [ -z "${ACTION_REF:-}" ] || [ -z "${ACTION_REPO:-}" ]; then
          echo "::error::vendor/feedvalidator is empty and no action ref/repository is available to fetch from"
          exit 1
        fi
        sha=$(
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ACTION_REPO}/contents/vendor/feedvalidator?ref=${ACTION_REF}" \
          | jq -r '.sha // empty'
        )
        if [ -z "$sha" ]; then
          echo "::error::Could not resolve vendored feedvalidator SHA from ${ACTION_REPO}@${ACTION_REF}"
          exit 1
        fi
        echo "::group::Fetch feedvalidator @ ${sha:0:7}"
        mkdir -p "$target"
        curl -fsSL "https://github.com/w3c/feedvalidator/archive/${sha}.tar.gz" \
          | tar -xz -C "$target" --strip-components=1
        echo "::endgroup::"
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install vendored feedvalidator dependencies
      shell: bash
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: '1'
      run: |
        echo "::group::pip install"
        pip install -q --require-hashes -r "${{ github.action_path }}/requirements.lock"
        echo "::endgroup::"
    - name: Validate feed
      id: validate
      shell: bash
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        COMPATIBILITY: ${{ inputs.compatibility }}
        ORIGIN_URL: ${{ inputs.origin-url }}
        PYTHONPATH: ${{ github.action_path }}/vendor/feedvalidator/src
      run: python "${{ github.action_path }}/entrypoint.py" "${{ inputs.feed }}"
